# Render.com one-click deploy spec for the FastAPI backend.
# Docs: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: fair-llm-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: APP_ENV
        value: production
      - key: STRICT_ENV_VALIDATION
        value: "true"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./fair_llm_backend.db
      # Set these as Secret Env Vars in the Render dashboard:
      - key: LLM_API_KEY
        sync: false
      - key: SALT
        sync: false
      - key: CORS_ORIGINS
        sync: false
